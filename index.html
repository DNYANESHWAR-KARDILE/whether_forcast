<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Whether-App</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>

<body>
    <!-- Navbar -->
    <div class="navbar">
        <div class="logo"></div>
        <h2>Sky Glass</h2>
        <div class="nav_hero">
            <div class="hero_link">
                <a href="#">Home</a>
                <a href="#">Whether</a>
                <a href="#">Forcast</a>
                <a href="#">About</a>
                <a href="#">Contact</a>
            </div>
        </div>
        <div class="signin">
            <button>Sign in</button>
        </div>
    </div>

    <!-- Hero Section -->
    <div class="hero_section">
        <div class="heroheading">
            <h1>Check Weather Anytime</h1>
            <p class="p1">Precision atmospheric data for your exact location. Experience the sky </p>
            <p class="p2">through the clarity of SkyGlass</p>
        </div>
        <!-- search input -->
        <div class="input_search">
            <div class="search_box">
                <i></i>
                <input type="text" placeholder="Enter City Or Zip Code">
                <button>Get Whether</button>
            </div>
        </div>


        <!-- result box -->
        <div class="resultbox">
            <div class="box1">
                <p></p>
            </div>
            <div class="box2">
                <p></p>
            </div>
        </div>

        <!-- weakly result -->
         <p>Weekly Forecast</p>

        <div class="weakresult">
            <div class="wbox1"></div>

        </div>
    </div>

</body>

</html>
